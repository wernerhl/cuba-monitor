name: Update Cuba Concordance Data

on:
  schedule:
    # 15th of each month at 06:00 UTC.
    # By then VIIRS DNB monthly composites for the previous month have
    # landed (~10–15 days after month end).
    - cron: '0 6 15 * *'
  workflow_dispatch:  # manual trigger from the Actions tab

permissions:
  contents: write

concurrency:
  # Only one update run at a time; a manual trigger preempts a scheduled one.
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # GEE extractions for a single new month are <10 min,
                          # but a cold start (re-running after a long gap) can need an hour.
    defaults:
      run:
        working-directory: ./pipeline

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch TROPOMI NO₂
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
        run: python fetch_no2.py
        continue-on-error: true

      - name: Fetch VIIRS DNB
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
        run: python fetch_dnb.py
        continue-on-error: true

      - name: Fetch Sentinel-2 NDVI
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
        run: python fetch_ndvi.py
        continue-on-error: true

      - name: Fetch IMF PortWatch
        run: python fetch_portwatch.py
        continue-on-error: true

      - name: Fetch El Toque FX
        run: python fetch_eltoque.py
        continue-on-error: true

      - name: Build concordance index + export dashboard JSON
        run: python export_dashboard_data.py

      - name: Commit & push updated data
        working-directory: .
        run: |
          git config user.name  "Cuba Monitor Bot"
          git config user.email "wernerhl@gmail.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "data: monthly update $(date -u +%Y-%m-%d)"
          git push
